<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netolink AI Lab - Smooth Motion</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .container { display: flex; gap: 25px; background: #1e1e1e; padding: 25px; border-radius: 16px; box-shadow: 0 10px 50px rgba(0,0,0,0.7); flex-wrap: wrap; justify-content: center; }
        
        #board-wrapper { position: relative; }
        #board { width: 450px; border: 2px solid #333; border-radius: 4px; overflow: hidden; }
        
        /* The invisible layer for clicks */
        #click-catcher { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); cursor: pointer; z-index: 10; }
        .catcher-sq { outline: none; }

        /* Smooth highlights */
        .highlight-selected { background-color: rgba(255, 255, 0, 0.4) !important; transition: background 0.2s; }
        .highlight-last-move { box-shadow: inset 0 0 4px 4px rgba(0, 255, 255, 0.5); }

        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .engine-card { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid #4af; }
        .score { font-size: 2em; color: #4af; font-family: monospace; font-weight: bold; }
        .history-box { background: #111; border: 1px solid #333; height: 100px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 0.85em; border-radius: 6px; color: #aaa; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { cursor: pointer; padding: 10px; background: #4af; color: #000; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #6bc4ff; }
        .btn-alt { background: #333; color: #ccc; }
        .btn-danger { background: #600; color: #fff; }
        .active-side { border: 2px solid #4af; background: #004466; color: white; }
        h1 span { color: #4af; font-weight: 800; }
    </style>
</head>
<body>

    <h1 style="font-weight: 300; margin-bottom: 20px;">Netolink <span>AI Lab</span></h1>

    <div class="container">
        <div id="board-wrapper">
            <div id="board"></div>
            <div id="click-catcher"></div>
        </div>

        <div class="sidebar">
            <div class="controls">
                <button id="btnWhite" class="active-side" onclick="changeSide('w')">White</button>
                <button id="btnBlack" onclick="changeSide('b')">Black</button>
            </div>

            <div class="engine-card">
                <div style="display:flex; justify-content: space-between; align-items:center;">
                    <small style="color: #666;">EVALUATION</small>
                    <div id="status" style="font-size: 0.75em; color: #4af;">Ready</div>
                </div>
                <div id="score" class="score">0.00</div>
            </div>

            <div id="history" class="history-box">No moves yet...</div>

            <div class="controls">
                <button class="btn-alt" onclick="confirmReset()">New Game</button>
                <button class="btn-alt" onclick="undoMove()">Undo</button>
                <button class="btn-danger" style="grid-column: span 2;" onclick="resign()">Resign</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let playerSide = 'w';
        let sourceSquare = null;
        const stockfish = new Worker('stockfish.js');

        function removeHighlights() {
            $('#board .square-55d63').removeClass('highlight-selected highlight-last-move');
        }

        function generateClickCatcher() {
            const catcher = document.getElementById('click-catcher');
            catcher.innerHTML = '';
            const files = playerSide === 'w' ? ['a','b','c','d','e','f','g','h'] : ['h','g','f','e','d','c','b','a'];
            const ranks = playerSide === 'w' ? [8,7,6,5,4,3,2,1] : [1,2,3,4,5,6,7,8];

            ranks.forEach(rank => {
                files.forEach(file => {
                    const sqPos = file + rank;
                    const sqDiv = document.createElement('div');
                    sqDiv.className = 'catcher-sq';
                    sqDiv.onclick = (e) => {
                        e.stopPropagation();
                        handleSquareClick(sqPos);
                    };
                    catcher.appendChild(sqDiv);
                });
            });
        }

        function handleSquareClick(square) {
            if (game.turn() !== playerSide || game.game_over()) return;

            if (sourceSquare) {
                let move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
                
                if (move === null) {
                    let piece = game.get(square);
                    if (piece && piece.color === playerSide) {
                        sourceSquare = square;
                        removeHighlights();
                        $(`#board .square-${square}`).addClass('highlight-selected');
                    } else {
                        sourceSquare = null;
                        removeHighlights();
                    }
                } else {
                    // Update board WITH animation
                    board.position(game.fen(), true); 
                    let from = sourceSquare;
                    sourceSquare = null;
                    removeHighlights();
                    $(`#board .square-${from}`).addClass('highlight-last-move');
                    $(`#board .square-${square}`).addClass('highlight-last-move');
                    updateUI();
                    window.setTimeout(askEngine, 250);
                }
            } else {
                let piece = game.get(square);
                if (piece && piece.color === playerSide) {
                    sourceSquare = square;
                    removeHighlights();
                    $(`#board .square-${square}`).addClass('highlight-selected');
                }
            }
        }

        function askEngine() {
            if (game.game_over()) return;
            $('#status').text('Thinking...');
            stockfish.postMessage('setoption name Threads value 4');
            stockfish.postMessage('setoption name Hash value 128');
            stockfish.postMessage(`position fen ${game.fen()}`);
            stockfish.postMessage('go depth 18');
        }

        stockfish.onmessage = function(e) {
            let msg = e.data;
            if (msg.includes('score cp')) {
                let s = (msg.split('score cp ')[1].split(' ')[0] / 100).toFixed(2);
                $('#score').text(playerSide === 'w' ? s : (s * -1).toFixed(2));
            }
            if (msg.includes('bestmove')) {
                let m = msg.split('bestmove ')[1].split(' ')[0];
                if (m && m !== '(none)' && game.turn() !== playerSide) {
                    let move = game.move({ from: m.substring(0,2), to: m.substring(2,4), promotion: 'q' });
                    // Update board WITH animation
                    board.position(game.fen(), true); 
                    removeHighlights();
                    $(`#board .square-${move.from}`).addClass('highlight-last-move');
                    $(`#board .square-${move.to}`).addClass('highlight-last-move');
                    updateUI();
                }
            }
        };

        function updateUI() {
            $('#history').text(game.pgn() || 'No moves yet...');
            $('#status').text(game.turn() === playerSide ? 'Your Turn' : 'Waiting...');
        }

        function confirmReset() {
            if (game.history().length > 0 && !game.game_over()) {
                if (!confirm("New game?")) return;
            }
            resetGame();
        }

        function resetGame() {
            game.reset();
            board.orientation(playerSide === 'w' ? 'white' : 'black');
            board.position('start', false); // No animation for reset
            sourceSquare = null;
            removeHighlights();
            updateUI();
            $('#score').text('0.00');
            generateClickCatcher();
            if (playerSide === 'b') askEngine();
        }

        function changeSide(side) {
            if (side === playerSide) return;
            playerSide = side;
            $('#btnWhite').toggleClass('active-side', side === 'w').toggleClass('btn-alt', side !== 'w');
            $('#btnBlack').toggleClass('active-side', side === 'b').toggleClass('btn-alt', side !== 'b');
            resetGame();
        }

        function resign() {
            if (confirm("Resign?")) {
                $('#status').text('Resigned.');
                game.load('8/8/8/8/8/8/8/8 w - - 0 1');
            }
        }

        function undoMove() {
            game.undo(); game.undo();
            board.position(game.fen(), true);
            removeHighlights();
            updateUI();
        }

        $(document).ready(function() {
            board = Chessboard('board', {
                draggable: false,
                position: 'start',
                moveSpeed: 'fast', // Sets animation speed
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            generateClickCatcher();
            updateUI();
        });
    </script>
</body>
</html>
