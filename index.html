<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stockfish Diagnostic - Netolink</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; line-height: 1.4; }
        .status-panel { border: 1px solid #0f0; padding: 15px; margin-bottom: 20px; }
        .log-item { margin: 5px 0; border-bottom: 1px solid #111; }
        .error { color: #f00; font-weight: bold; }
        .success { color: #0f0; background: #030; }
        #chess-board-test { width: 200px; height: 200px; border: 1px solid #333; margin-top: 10px; display: flex; align-items: center; justify-content: center; color: #444; }
    </style>
</head>
<body>

    <h1>System Diagnostic: Stockfish Connection</h1>

    <div class="status-panel">
        <div>1. Worker Support: <span id="worker-support">Testing...</span></div>
        <div>2. Stockfish File Load: <span id="file-load">Testing...</span></div>
        <div>3. Stockfish Engine Response: <span id="engine-response">Waiting...</span></div>
    </div>

    <h3>Detailed Logs:</h3>
    <div id="logs"></div>

    <div id="chess-board-test">UI Container Placeholder</div>

    <script>
        const logs = document.getElementById('logs');
        function log(msg, isError = false) {
            const div = document.createElement('div');
            div.className = 'log-item' + (isError ? ' error' : '');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.prepend(div);
        }

        // Test 1: Worker Support
        if (window.Worker) {
            document.getElementById('worker-support').innerHTML = '<span class="success">PASSED</span>';
            log("Browser supports Web Workers.");
        } else {
            document.getElementById('worker-support').innerHTML = '<span class="error">FAILED</span>';
            log("Web Workers NOT supported!", true);
        }

        try {
            log("Attempting to load Stockfish from Cloudflare...");
            const stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
            
            document.getElementById('file-load').innerHTML = '<span class="success">CONNECTED</span>';

            // Test 3: Engine Response
            log("Sending 'uci' command to Stockfish...");
            stockfish.postMessage('uci');

            stockfish.onmessage = function(event) {
                log("RECEIVED FROM ENGINE: " + event.data);
                if (event.data.includes('uciok')) {
                    document.getElementById('engine-response').innerHTML = '<span class="success">STOKFISH IS ALIVE (uciok)</span>';
                    log("SUCCESS: Engine is fully functional.");
                }
            };

            stockfish.onerror = function(e) {
                document.getElementById('engine-response').innerHTML = '<span class="error">WORKER ERROR</span>';
                log("Worker Error: " + e.message, true);
            };

        } catch (e) {
            document.getElementById('file-load').innerHTML = '<span class="error">LOAD FAILED</span>';
            log("Critical Error: " + e.message, true);
        }
    </script>
</body>
</html>
