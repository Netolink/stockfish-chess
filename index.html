<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netolink AI Lab</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f0f; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; min-height: 100vh; }
        .container { display: flex; gap: 30px; max-width: 1000px; width: 100%; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        #board { width: 450px; max-width: 90vw; box-shadow: 0 0 40px rgba(0,0,0,0.8); border: 1px solid #333; }
        .sidebar { flex: 1; min-width: 320px; background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; }
        .engine-info { background: #050505; padding: 20px; border-radius: 8px; border-left: 4px solid #4af; margin: 20px 0; }
        .score { font-size: 2em; font-weight: bold; color: #4af; font-family: monospace; }
        .best-line { font-family: 'Courier New', monospace; color: #777; direction: ltr; text-align: left; margin-top: 10px; background: #111; padding: 10px; border-radius: 4px; font-size: 0.9em; }
        .controls { display: flex; gap: 10px; margin-top: auto; }
        button { flex: 1; cursor: pointer; padding: 12px; background: #4af; color: #000; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #358ccb; }
        button#undoBtn { background: #333; color: #ccc; }
        .label { color: #555; font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; }
        h1 { margin: 0; font-weight: 300; }
        h1 span { font-weight: 800; color: #4af; }
    </style>
</head>
<body>

    <h1>Netolink <span>AI Lab</span></h1>

    <div class="container">
        <div id="board"></div>
        <div class="sidebar">
            <div class="label">Status</div>
            <div id="status" style="font-size: 1.2em; font-weight: 600; margin-bottom: 5px;">Initializing...</div>

            <div class="engine-info">
                <div class="label">Evaluation</div>
                <div id="score" class="score">0.00</div>
                <div class="label" style="margin-top:15px;">Best Move Sequence</div>
                <div class="best-line" id="bestLine">Waiting...</div>
            </div>

            <div class="controls">
                <button onclick="resetGame()">New Game</button>
                <button id="undoBtn" onclick="undoMove()">Undo</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        function onDragStart (source, piece) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false;
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
            window.setTimeout(askStockfish, 250);
        }

        function askStockfish() {
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 12');
            stockfish.onmessage = function(event) {
                var msg = event.data;
                if (msg.includes('score cp')) {
                    var score = msg.split('score cp ')[1].split(' ')[0];
                    var eval = (score / 100).toFixed(2);
                    $('#score').text(eval > 0 ? '+' + eval : eval);
                }
                if (msg.includes(' pv ')) {
                    $('#bestLine').text(msg.split(' pv ')[1].split(' ').slice(0, 5).join(' → '));
                }
                if (msg.includes('bestmove')) {
                    var best = msg.split(' ')[1];
                    if (best && best !== '(none)') {
                        game.move({ from: best.substring(0, 2), to: best.substring(2, 4), promotion: 'q' });
                        board.position(game.fen());
                        updateStatus();
                    }
                }
            };
        }

        function updateStatus() {
            var status = game.turn() === 'b' ? 'Engine is thinking...' : 'Your Turn';
            if (game.in_checkmate()) status = 'Checkmate!';
            else if (game.in_draw()) status = 'Draw';
            $('#status').text(status);
        }

        function resetGame() {
            game.reset(); board.start(); updateStatus();
            $('#score').text('0.00'); $('#bestLine').text('Waiting...');
        }

        function undoMove() {
            game.undo(); game.undo();
            board.position(game.fen());
            updateStatus();
        }

        // Using official Wikimedia SVG pieces - high reliability
        function pieceTheme (piece) {
            return 'https://upload.wikimedia.org/wikipedia/commons/' +
                {
                    bK: 'f/f0/Chess_kdt45.svg', bQ: '4/47/Chess_qdt45.svg', bR: 'f/ff/Chess_rdt45.svg',
                    bB: '9/98/Chess_bdt45.svg', bN: 'e/ef/Chess_ndt45.svg', bP: 'c/c7/Chess_pdt45.svg',
                    wK: '4/42/Chess_klt45.svg', wQ: '1/15/Chess_qlt45.svg', wR: '7/72/Chess_rlt45.svg',
                    wB: 'b/b1/Chess_blt45.svg', wN: '7/70/Chess_nlt45.svg', wP: '4/45/Chess_plt45.svg'
                }[piece];
        }

        $(document).ready(function() {
            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                onDragStart: onDragStart,
                onDrop: onDrop,
                pieceTheme: pieceTheme
            });
            updateStatus();
        });
    </script>
</body>
</html>
