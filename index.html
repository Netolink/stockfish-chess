<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netolink AI Lab</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; background: #111; color: white; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        #board { width: 400px; border: 2px solid #444; }
        .sidebar { background: #222; padding: 25px; border-radius: 10px; width: 300px; }
        .engine-box { background: #000; padding: 15px; margin: 15px 0; border-left: 4px solid #4af; }
        .score { font-size: 2em; color: #4af; font-family: monospace; }
        button { cursor: pointer; padding: 10px; width: 100%; margin-top: 10px; background: #4af; border: none; font-weight: bold; border-radius: 5px; }
        .best-line { font-size: 0.8em; color: #888; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Netolink <span>AI Lab</span></h1>

    <div class="container">
        <div id="board"></div>
        <div class="sidebar">
            <div id="status">Status: Loading...</div>
            <div class="engine-box">
                <div style="font-size: 0.8em; color: #555;">EVALUATION</div>
                <div id="score" class="score">0.00</div>
                <div id="bestLine" class="best-line">---</div>
            </div>
            <button onclick="resetGame()">New Game</button>
            <button style="background: #444; color: #ccc;" onclick="undoMove()">Undo</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            
            $('#status').text('Status: Engine thinking...');
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 12');
        }

        stockfish.onmessage = function(event) {
            var msg = event.data;
            if (msg.includes('score cp')) {
                var s = msg.split('score cp ')[1].split(' ')[0];
                $('#score').text((s/100).toFixed(2));
            }
            if (msg.includes('pv ')) {
                $('#bestLine').text(msg.split('pv ')[1].split(' ').slice(0, 5).join(' → '));
            }
            if (msg.includes('bestmove ')) {
                var m = msg.split('bestmove ')[1].split(' ')[0];
                if (m && m !== '(none)') {
                    game.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: 'q' });
                    board.position(game.fen());
                    $('#status').text('Status: Your turn');
                }
            }
        };

        function resetGame() {
            game.reset();
            board.start();
            $('#score').text('0.00');
            $('#status').text('Status: Ready');
        }

        function undoMove() {
            game.undo(); game.undo();
            board.position(game.fen());
        }

        // Initialize only after all assets are loaded
        window.onload = function() {
            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                onDrop: onDrop,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            $('#status').text('Status: Ready');
        };
    </script>
</body>
</html>
