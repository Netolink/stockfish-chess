<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Netolink AI Chess Lab</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        #board { width: 450px; margin: 20px 0; border: 5px solid #333; border-radius: 4px; }
        .container { display: flex; gap: 20px; max-width: 1000px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .sidebar { flex: 1; min-width: 300px; background: #2d2d2d; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .status-box { margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #444; }
        .engine-info { background: #000; padding: 15px; border-radius: 5px; border-left: 4px solid #4af; }
        .score { font-size: 1.5em; font-weight: bold; color: #4af; margin-bottom: 10px; }
        .best-line { font-family: monospace; color: #aaa; line-height: 1.6; direction: ltr; text-align: left; }
        button { cursor: pointer; padding: 10px 20px; background: #4af; color: black; border: none; border-radius: 4px; font-weight: bold; margin-left: 10px; }
        button:hover { background: #358ccb; }
        .label { color: #888; font-size: 0.9em; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1>Netolink <span style="color:#4af">AI Chess Lab</span></h1>

    <div class="container">
        <div id="board"></div>

        <div class="sidebar">
            <div class="status-box">
                <div class="label">סטטוס משחק:</div>
                <div id="status" style="font-size: 1.2em;">טוען מנוע...</div>
            </div>

            <div class="engine-info">
                <div class="label">ניתוח Stockfish:</div>
                <div id="score" class="score">0.00</div>
                <div class="label">רצף מהלכים חוזה (Best Line):</div>
                <div id="bestLine" class="best-line">-</div>
            </div>

            <div style="margin-top: 20px;">
                <button onclick="newGame()">משחק חדש</button>
                <button onclick="undo()">חזור מהלך</button>
            </div>
        </div>
    </div>

    <script>
        var board = null;
        var game = new Chess();
        var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        function onDragStart (source, piece) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false;
        }

        function updateEngineAnalysis(event) {
            var line = event.data;
            
            // חילוץ הניקוד
            if (line.includes('score cp')) {
                var score = line.split('score cp ')[1].split(' ')[0];
                var eval = (score / 100).toFixed(2);
                $('#score').text(eval > 0 ? '+' + eval : eval);
            }

            // חילוץ רצף המהלכים (PV)
            if (line.includes(' pv ')) {
                var pv = line.split(' pv ')[1].split(' ');
                var displayLine = pv.slice(0, 5).join(' → '); // מציג 5 מהלכים קדימה
                $('#bestLine').text(displayLine);
            }

            // ביצוע מהלך המחשב
            if (line.includes('bestmove')) {
                var bestMove = line.split(' ')[1];
                game.move({
                    from: bestMove.substring(0, 2),
                    to: bestMove.substring(2, 4),
                    promotion: 'q'
                });
                board.position(game.fen());
                updateStatus();
            }
        }

        function makeEngineMove() {
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 15');
            stockfish.onmessage = updateEngineAnalysis;
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
            window.setTimeout(makeEngineMove, 500);
        }

        function updateStatus () {
            var status = game.turn() === 'b' ? 'מחשב חושב...' : 'תורך (לבן)';
            if (game.in_checkmate()) status = 'מט!';
            else if (game.in_draw()) status = 'תיקו';
            $('#status').text(status);
        }

        function undo() {
            game.undo(); // ביטול מהלך מחשב
            game.undo(); // ביטול מהלך שחקן
            board.position(game.fen());
            updateStatus();
        }

        function newGame() {
            game.reset();
            board.start();
            updateStatus();
            $('#score').text('0.00');
            $('#bestLine').text('-');
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            pieceTheme: 'https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('board', config);
        updateStatus();
    </script>
</body>
</html>
