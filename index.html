<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netolink AI Labs - Stockfish Chess</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            display: flex;
            gap: 25px;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.7);
            flex-wrap: wrap;
            justify-content: center;
        }

        #board-wrapper {
            position: relative;
        }

        #board {
            width: 450px;
            border: 2px solid #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .highlight-selected {
            background-color: rgba(255, 255, 0, 0.4) !important;
        }

        .highlight-last-move {
            box-shadow: inset 0 0 4px 4px rgba(0, 255, 255, 0.5);
        }

        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .engine-card {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #4af;
        }

        .score {
            font-size: 2em;
            color: #4af;
            font-family: monospace;
            font-weight: bold;
        }

        .history-box {
            background: #111;
            border: 1px solid #333;
            height: 120px;
            overflow-y: auto;
            padding: 10px;
            font-family: monospace;
            font-size: 0.85em;
            border-radius: 6px;
            color: #aaa;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            cursor: pointer;
            padding: 10px;
            background: #4af;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #6bc4ff;
        }

        .btn-alt {
            background: #333;
            color: #ccc;
        }

        .btn-danger {
            background: #600;
            color: #fff;
        }

        .active-side {
            border: 2px solid #4af;
            background: #004466;
            color: white;
        }

        /* תיקון הכלים האכולים - קטנים יותר ומסודרים */
        .captured-pieces {
            display: flex;
            flex-wrap: wrap;
            /* מאפשר לכלים לרדת שורה אם יש הרבה */
            align-items: center;
            gap: 2px;
            min-height: 30px;
            margin-top: 5px;
            padding: 8px;
            background: #252525;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .captured-pieces img {
            height: 18px;
            /* הקטנה משמעותית של הכלים */
            width: auto;
            opacity: 0.9;
        }

        .advantage-tag {
            font-size: 11px;
            font-weight: bold;
            color: #aaa;
            margin-left: 5px;
            font-family: monospace;
        }

        .advantage-score {
            font-weight: bold;
            color: #4af;
            margin-left: 5px;
        }

        /* הוסף את זה ב-CSS */
        .square-55d63 {
            cursor: pointer;
        }

        .highlight-hint {
            position: relative;
        }

        .highlight-hint::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20%;
            /* גודל הנקודה */
            height: 20%;
            background: rgba(0, 0, 0, 0.2);
            /* צבע הנקודה */
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
        }

        /* סימון שח למלך (הילה אדומה מסביב למשבצת) */
        .highlight-check {
            box-shadow: inset 0 0 4px 4px rgba(255, 0, 0, 0.7) !important;
        }

        /* הודעת מט וכפתור Rematch */
        #game-over-overlay {
            margin-top: 15px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
            text-align: center;
            display: none;
            /* יופיע רק בסיום המשחק */
            border: 1px solid #444;
        }

        .rematch-btn {
            margin-top: 10px;
            background: #28a745 !important;
            /* ירוק מקצועי */
            color: white !important;
            width: 100%;
        }

        /* מבטיח שהכלים החדשים יופיעו מיד ללא השהיה גרפית */
        .chessboard-63f59 {
            image-rendering: -webkit-optimize-contrast;
        }

        /* שינוי המכולה הראשית */
        .container {
            display: flex;
            gap: 20px;
            background: #1e1e1e;
            padding: 15px;
            /* הקטנת הריפוד במובייל */
            border-radius: 16px;
            width: 95%;
            /* תפיסת רוב רוחב המסך */
            max-width: 800px;
            flex-direction: row;
            /* ברירת מחדל למחשב */
            flex-wrap: wrap;
            /* מאפשר אלמנטים אחד מתחת לשני */
            justify-content: center;
        }

        /* התאמת הלוח - הכי חשוב! */
        #board {
            width: 100vw;
            /* תפיסת רוחב המסך */
            max-width: 450px;
            /* אבל לא יותר מהגודל המקורי */
            height: auto;
        }

        /* התאמת סרגל הצד */
        .sidebar {
            width: 100%;
            /* במובייל יתפוס את כל הרוחב */
            max-width: 450px;
            /* שיהיה ברוחב של הלוח */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Media Query למכשירים ניידים */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                /* לוח מעל סרגל כלים */
                align-items: center;
                padding: 10px;
            }

            #board {
                max-width: 350px;
                /* גודל נוח יותר לסמארטפונים */
            }

            .score {
                font-size: 1.5em;
                /* הקטנת הטקסט למסכים קטנים */
            }
        }
    </style>
</head>

<body>

    <h1 style="font-weight: 300; margin-bottom: 20px;">Netolink AI Labs - Stockfish Chess</h1>

    <div class="container">
        <div id="board-wrapper">
            <div id="board"></div>
        </div>

        <div class="sidebar">
            <div class="controls">
                <button id="btnWhite" class="active-side" onclick="changeSide('w')">White</button>
                <button id="btnBlack" onclick="changeSide('b')">Black</button>
            </div>
            <div class="engine-card">
                <div style="display:flex; justify-content: space-between; align-items:center;">
                    <small style="color: #666;">EVALUATION</small>
                    <div id="status" style="font-size: 0.75em; color: #4af;">Ready</div>
                </div>
                <div id="score" class="score">0.00</div>
            </div>
            <div id="history" class="history-box">No moves yet...</div>
            <div id="game-over-overlay">
                <div id="game-over-msg" style="font-weight: bold; font-size: 1.2em; color: #ff4444;">CHECKMATE</div>
                <button class="rematch-btn" onclick="rematch()">Rematch</button>
            </div>
            <div class="controls">
                <button class="btn-alt" onclick="confirmReset()">New Game</button>
                <button class="btn-alt" onclick="undoMove()">Undo</button>
                <button class="btn-danger" style="grid-column: span 2;" onclick="resign()">Resign</button>
            </div>
            <div class="controls">
                <button class="btn-alt" style="grid-column: span 2;" onclick="flipBoard()">Flip Board 🔄</button>
            </div>

            <div class="engine-card">
                <div id="white-captured" class="captured-pieces"></div>
                <div id="black-captured" class="captured-pieces"></div>
            </div>
        </div>
    </div>

    <div id="promotion-modal"
        style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center;">
        <div
            style="background: #1e1e1e; padding: 25px; border-radius: 12px; text-align: center; border: 2px solid #4facfe;">
            <h3 style="color: white; margin-bottom: 20px; font-family: sans-serif;">Choose piece for promotion</h3>
            <div id="promotion-options" style="display: flex; gap: 20px;">
                <img data-piece="q" style="width: 75px; cursor: pointer;">
                <img data-piece="r" style="width: 75px; cursor: pointer;">
                <img data-piece="b" style="width: 75px; cursor: pointer;">
                <img data-piece="n" style="width: 75px; cursor: pointer;">
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let playerSide = 'w';
        let sourceSquare = null;

        function onSquareClick(square) {
            if (game.turn() !== playerSide || game.game_over()) return;

            // ביטול בחירה בלחיצה שנייה (Deselect)
            if (sourceSquare === square) {
                sourceSquare = null;
                removeHighlights();
                return;
            }

            if (sourceSquare) {
                const piece = game.get(sourceSquare);
                let moveOptions = { from: sourceSquare, to: square, promotion: 'q' };

                // הבלוק החדש שמשתמש במודאל הקיים
                if (piece && piece.type === 'p' && (square[1] === '8' || square[1] === '1')) {
                    const colorChar = piece.color;
                    const baseUrl = 'https://chessboardjs.com/img/chesspieces/wikipedia/';

                    // מעדכן את התמונות במודאל לפי צבע השחקן
                    $('#promotion-options img').each(function () {
                        const pieceType = $(this).data('piece').toUpperCase();
                        $(this).attr('src', `${baseUrl}${colorChar}${pieceType}.png`);
                    });

                    // מציג את המודאל הקיים
                    $('#promotion-modal').css('display', 'flex');

                    // מגדיר מה קורה כשלוחצים על כלי במודאל
                    $('#promotion-options img').off('click').on('click', function () {
                        const selectedPiece = $(this).data('piece');
                        $('#promotion-modal').hide();

                        // מבצע את המהלך
                        let move = game.move({ from: sourceSquare, to: square, promotion: selectedPiece });
                        if (move) {
                            board.position(game.fen(), false);
                            sourceSquare = null;
                            removeHighlights();
                            updateUI();
                            setTimeout(askEngine, 300);
                        }
                    });
                    return; // עוצר את המשך הפונקציה עד לבחירה במודאל
                }

                let move = game.move(moveOptions);

                if (move === null) {
                    // אם המהלך לא חוקי, בדוק אם המשתמש פשוט בחר כלי אחר שלו
                    let p = game.get(square);
                    if (p && p.color === playerSide) {
                        sourceSquare = square;
                        highlight(square);
                    } else {
                        sourceSquare = null;
                        removeHighlights();
                    }
                } else {
                    // מהלך חוקי בוצע בלחיצה (קליק-קליק)
                    board.position(game.fen(), true); // עדכון מקבילי של המלך והצריח
                    let from = sourceSquare;
                    sourceSquare = null;
                    removeHighlights();
                    highlightLastMove(from, square);
                    updateUI();

                    // החזרה ל-300ms - מהיר וחלק
                    setTimeout(askEngine, 300);
                }
            } else {
                // בחירת כלי ראשונית
                let p = game.get(square);
                if (p && p.color === playerSide) {
                    sourceSquare = square;
                    highlight(square);
                }
            }
        }

        // פונקציית הגרירה
        function onDrop(source, target) {
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            sourceSquare = null;
            removeHighlights();
            highlightLastMove(source, target);
            updateUI();
            //setTimeout(askEngine, 250);
        }

        $(document).ready(function () {

            // 1. בדיקה האם הגענו מה-Editor - שליפת הנתונים
            const customFen = localStorage.getItem('customStartingPosition');
            const customSide = localStorage.getItem('playerSide');

            if (customFen) {
                game.load(customFen);
                playerSide = customSide || 'w'; // מעדכן את הצד שבחרת ב-Editor

                // הערה: את ה-orientation נגדיר מיד בתוך ה-Chessboard למטה
                localStorage.removeItem('customStartingPosition');
            }

            // 2. אתחול הלוח
            board = Chessboard('board', {
                draggable: true,
                // התיקון כאן: הלוח יתהפך אם playerSide הוא 'b'
                orientation: playerSide === 'b' ? 'black' : 'white',
                position: (typeof customFen !== 'undefined' && customFen) ? customFen : 'start',

                onDragStart: function (source, piece, position, orientation) {
                    if (window.event && window.event.which !== 1) return false;
                    if (game.game_over() || piece.search(new RegExp(`^${playerSide}`)) === -1) return false;

                    if (sourceSquare === source) {
                        sourceSquare = null;
                        removeHighlights();
                    } else {
                        sourceSquare = source;
                        highlight(source);
                    }
                },
                onDrop: function (source, target) {
                    if (source === target) return;

                    const piece = game.get(source);
                    const isPromotion = piece && piece.type === 'p' &&
                        ((piece.color === 'w' && target[1] === '8') ||
                            (piece.color === 'b' && target[1] === '1'));

                    let moveOptions = { from: source, to: target, promotion: 'q' };

                    if (isPromotion) {
                        const colorChar = piece.color;
                        const baseUrl = 'https://chessboardjs.com/img/chesspieces/wikipedia/';

                        $('#promotion-options img').each(function () {
                            const pieceType = $(this).data('piece').toUpperCase();
                            $(this).attr('src', `${baseUrl}${colorChar}${pieceType}.png`);
                        });

                        $('#promotion-modal').css('display', 'flex');

                        $('#promotion-options img').off('click').on('click', function () {
                            const selectedPiece = $(this).data('piece');
                            $('#promotion-modal').hide();

                            game.move({ from: source, to: target, promotion: selectedPiece });
                            board.position(game.fen(), false);

                            updateUI();
                            setTimeout(askEngine, 300);
                        });
                        return;
                    }

                    let move = game.move(moveOptions);
                    if (move === null) return 'snapback';

                    board.position(game.fen(), false);

                    sourceSquare = null;
                    removeHighlights();
                    highlightLastMove(source, target);
                    updateUI();

                    setTimeout(askEngine, 300);
                },
                moveSpeed: 'fast',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $(window).on('resize', board.resize);

            $('#board').on('mousedown', '.square-55d63', function (e) {
                if (e.which !== 1) return;
                let square = $(this).data('square');
                if (sourceSquare && sourceSquare !== square) {
                    onSquareClick(square);
                }
            });

            updateUI();

            // 3. הפעלת המחשב אוטומטית אם זה תורו
            if (game.turn() !== playerSide) {
                $('#status').text('Stockfish is thinking...');
                setTimeout(askEngine, 500);
            }
        });

        // 1. הגדרת הנתיבים מראש - זה הקסם שפותר את השגיאות ב-Console
        var Module = {
            locateFile: function (path) {
                if (path.endsWith('.wasm')) return 'sf18.wasm';
                return path;
            }
        };

        // 2. טעינת ה-Worker (בלי ה-?v= כדי לא לבלבל את המנוע הפנימי)
        const stockfish = new Worker('sf18.js');

        // פקודות אתחול חד-פעמיות (מחוץ ל-askEngine)
        stockfish.postMessage('uci');
        stockfish.postMessage('setoption name MultiPV value 2');
        stockfish.postMessage('setoption name Threads value 1');
        stockfish.postMessage('setoption name Hash value 128');
        //stockfish.postMessage('setoption name Use NNUE value true');
        stockfish.postMessage('isready'); // פקודת הקסם: מבקשים מהמנוע לאשר שהוא מוכן לפני שמתחילים

        function askEngine() {
            if (game.game_over()) {
                stockfish.postMessage('stop');
                return;
            }

            // 1. עצירה וניקוי - שולחים ומחכים רגע
            stockfish.postMessage('stop');
            stockfish.postMessage('ucinewgame');
            stockfish.postMessage('isready');

            $('#status').text('Stockfish 18 (Neural) is thinking...');

            // 2. משתמשים ב-setTimeout כדי להפריד את שלב ה"הכנה" משלב ה"ביצוע"
            setTimeout(function () {
                // שולחים את המיקום
                stockfish.postMessage('position fen ' + game.fen());

                // מוודאים שוב שהמנוע מוכן לקבל את פקודת ה-go
                stockfish.postMessage('isready');

                // פקודת ה-go המקורית שלך (עומק 18, זמן 10000)
                stockfish.postMessage('go depth 18 movetime 10000');
            }, 100); // 100 מילישניות יבטיחו שהמנוע סיים את ה-readyok של האתחול
        }

        stockfish.onmessage = function (event) {
            let msg = event.data;
            //console.log("SF Output:", msg); // שורת אבחון קריטית

            // 1. עדכון מדד ההערכה (Score)
            if (msg.includes('score cp')) {
                let scoreVal = (msg.split('score cp ')[1].split(' ')[0] / 100).toFixed(2);
                // התאמת הציון לפי הצד של השחקן
                $('#score').text(playerSide === 'w' ? scoreVal : (scoreVal * -1).toFixed(2));
            }

            // 2. ביצוע המהלך הטוב ביותר של המנוע
            if (msg.includes('bestmove')) {
                // עדכון הסטטוס מיד עם קבלת המהלך
                $('#status').text(game.turn() === playerSide ? 'Your Turn' : 'Waiting...');

                let bestMove = msg.split('bestmove ')[1].split(' ')[0];

                // מוודא שהמהלך תקין ושזה לא תור השחקן
                if (bestMove && bestMove !== '(none)' && game.turn() !== playerSide) {
                    let move = game.move({
                        from: bestMove.substring(0, 2),
                        to: bestMove.substring(2, 4),
                        promotion: 'q'
                    });

                    if (move) {
                        board.position(game.fen(), true);
                        removeHighlights();
                        highlightLastMove(move.from, move.to);
                        updateUI();
                    }
                }
            }
        };

        // פונקציה להיפוך ויזואלי של הלוח
        function flipBoard() {
            const current = board.orientation();
            board.orientation(current === 'white' ? 'black' : 'white');
        }

        // פונקציה לחישוב והצגת הכלים האכולים (יתרון)
        function updateCapturedPieces() {
            const fen = game.fen();
            const pieces = {
                'p': 8, 'n': 2, 'b': 2, 'r': 2, 'q': 1,
                'P': 8, 'N': 2, 'B': 2, 'R': 2, 'Q': 1
            };

            for (let char of fen.split(' ')[0]) {
                if (pieces[char] !== undefined) pieces[char]--;
            }

            const whiteCapturedDiv = $('#white-captured').empty();
            const blackCapturedDiv = $('#black-captured').empty();

            const symbolMap = { 'p': 'p', 'n': 'n', 'b': 'b', 'r': 'r', 'q': 'q' };
            const valueMap = { 'p': 1, 'n': 3, 'b': 3, 'r': 5, 'q': 9 };

            let whiteScore = 0;
            let blackScore = 0;

            // כלים שחורים שאכל הלבן (מחושב עבור יתרון לבן)
            for (let p in symbolMap) {
                for (let i = 0; i < pieces[p]; i++) {
                    whiteCapturedDiv.append(`<img src="https://chessboardjs.com/img/chesspieces/wikipedia/b${symbolMap[p].toUpperCase()}.png">`);
                    whiteScore += valueMap[p];
                }
            }

            // כלים לבנים שאכל השחור (מחושב עבור יתרון שחור)
            for (let p in symbolMap) {
                for (let i = 0; i < pieces[p.toUpperCase()]; i++) {
                    blackCapturedDiv.append(`<img src="https://chessboardjs.com/img/chesspieces/wikipedia/w${symbolMap[p].toUpperCase()}.png">`);
                    blackScore += valueMap[p];
                }
            }

            // הצגת הפרש הנקודות
            const diff = whiteScore - blackScore;
            if (diff > 0) {
                whiteCapturedDiv.append(`<span class="advantage-tag">+${diff}</span>`);
            } else if (diff < 0) {
                blackCapturedDiv.append(`<span class="advantage-tag">+${Math.abs(diff)}</span>`);
            }
        }

        function highlight(sq) {
            removeHighlights(); $(`#board .square-${sq}`).addClass('highlight-selected');
            showHints(sq);
        }
        function showHints(sq) {
            let moves = game.moves({ square: sq, verbose: true });
            moves.forEach(m => {
                $(`#board .square-${m.to}`).addClass('highlight-hint');
            });
        }
        function highlightLastMove(f, t) { $(`#board .square-${f}, #board .square-${t}`).addClass('highlight-last-move'); }
        function removeHighlights() {
            // הסרה של כל הקלאסים של הסימונים מהלוח
            $('#board [class*="square-"]').removeClass('highlight-selected highlight-last-move highlight-hint highlight-check');
        }

        function updateUI() {
            // 1. עדכון היסטוריית המהלכים
            const moveHistory = game.history().join(' ');
            $('#history').text(moveHistory.length > 0 ? moveHistory : "No moves yet...");

            updateCapturedPieces();

            // 2. ניקוי סימוני שח קודמים
            $('#board [class*="square-"]').removeClass('highlight-check');

            // 3. טיפול במצבי סיום משחק (מט, תיקו, או משחק פעיל)
            if (game.in_checkmate()) {
                // מצב מט - הסיום שבו אחד הצדדים ניצח
                $('#status').text('Game Over');
                $('#game-over-overlay').fadeIn();
                $('#game-over-msg').text('CHECKMATE - ' + (game.turn() === 'w' ? 'Black Wins' : 'White Wins'));
            }
            else if (game.in_draw()) {
                // כאן הקסם: מטפל במלך מול מלך, פט, חזרות, וחוק 50 המהלכים
                $('#status').text('Game Over - Draw');
                $('#game-over-overlay').fadeIn();

                // זיהוי סוג התיקו (אופציונלי להודעה מפורטת יותר)
                let reason = 'DRAW';
                if (game.in_stalemate()) reason = 'STALEMATE';
                else if (game.insufficient_material()) reason = 'DRAW (Insufficient Material)'; // זה המקרה של מלך מול מלך

                $('#game-over-msg').text(reason);
            }
            else {
                // המשחק עדיין פעיל - מעדכנים תור ושח במידת הצורך
                $('#status').text(game.turn() === playerSide ? 'Your Turn' : 'Waiting...');

                if (game.in_check()) {
                    const king = game.turn() === 'w' ? 'K' : 'k';
                    let square = findKingSquare(king);
                    $(`#board .square-${square}`).addClass('highlight-check');
                }
            }
        }

        // פונקציית עזר למציאת המלך על הלוח
        function findKingSquare(king) {
            const boardState = game.board();
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (boardState[r][c] && boardState[r][c].type === 'k' && (king === 'K' ? boardState[r][c].color === 'w' : boardState[r][c].color === 'b')) {
                        return String.fromCharCode(97 + c) + (8 - r);
                    }
                }
            }
        }

        function confirmReset() {
            if (game.history().length > 0 && !game.game_over()) {
                if (!confirm("Game in progress. Start new game?")) return;
            }
            resetGame();
        }

        function changeSide(side) {
            if (side === playerSide) return;
            if (game.history().length > 0 && !game.game_over()) {
                if (!confirm("Changing sides will restart the game. Proceed?")) return;
            }
            playerSide = side;
            $('#btnWhite').toggleClass('active-side', side === 'w').toggleClass('btn-alt', side !== 'w');
            $('#btnBlack').toggleClass('active-side', side === 'b').toggleClass('btn-alt', side !== 'b');
            resetGame();
        }

        function resetGame() {
            game.reset();
            board.orientation(playerSide === 'w' ? 'white' : 'black');
            board.position('start');

            $('#game-over-overlay').hide(); // הסתרת הודעת המט

            sourceSquare = null;
            removeHighlights();
            updateUI();

            $('#score').text('0.00');
            if (playerSide === 'b') askEngine();
        }

        function undoMove() {
            // 1. הטיפ הקריטי: אומרים למנוע להפסיק לחשב מיד כדי למנוע תקיעה
            stockfish.postMessage('stop');

            // הסתרת הודעת המט אם הייתה קיימת
            $('#game-over-overlay').hide();

            // 2. בדיקה: האם המחשב באמצע המחשבה (כלומר לא תור השחקן)?
            if (game.turn() !== playerSide) {
                // המחשב חושב על מהלך - נבטל רק את המהלך האחרון של המשתמש
                game.undo();
            } else {
                // המחשב כבר שיחק - נבטל את המהלך של המחשב ואת המהלך של המשתמש
                game.undo();
                game.undo();
            }

            // 3. עדכון ויזואלי של הלוח והממשק
            board.position(game.fen(), true);
            removeHighlights();

            // 4. איפוס הסטטוס ל-"Ready" במקום להישאר על "Thinking"
            $('#status').text('Ready');
            updateUI();
        }

        function resign() { if (confirm("Resign?")) { alert("You resigned."); resetGame(); } }

        function rematch() {
            // 1. הסתרה מיידית של שכבת סיום המשחק
            $('#game-over-overlay').hide();

            // 2. עצירה של המנוע כדי שלא ינסה לחשב מהלכים מהמשחק שנגמר
            stockfish.postMessage('stop');

            // 3. החלפת צד והתחלה מחדש
            // הפונקציה changeSide כבר קוראת ל-resetGame, שמנקה את הלוח והסטטוס
            changeSide(playerSide === 'w' ? 'b' : 'w');
        }

    </script>
</body>
