<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netolink AI Chess Lab v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { display: flex; gap: 25px; background: #1e1e1e; padding: 25px; border-radius: 16px; box-shadow: 0 10px 50px rgba(0,0,0,0.7); flex-wrap: wrap; justify-content: center; }
        
        #board { display: grid; grid-template-columns: repeat(8, 55px); grid-template-rows: repeat(8, 55px); border: 4px solid #333; user-select: none; }
        .sq { width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 44px; cursor: pointer; }
        .w-sq { background: #eeeed2; }
        .b-sq { background: #769656; }
        .selected { background: #f6f669 !important; }
        
        /* שיפור נראות הכלים הלבנים */
        .white-piece { color: #fff; text-shadow: 0 0 3px #000, 1px 1px 2px #000; }
        .black-piece { color: #000; }

        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .engine-card { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid #4af; }
        .score { font-size: 2em; color: #4af; font-family: monospace; font-weight: bold; }
        
        .history-box { background: #111; border: 1px solid #333; height: 120px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 0.9em; border-radius: 6px; }
        .history-title { font-size: 0.7em; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { cursor: pointer; padding: 10px; background: #4af; color: #000; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #6bc4ff; }
        .btn-alt { background: #333; color: #ccc; }
        .active-side { border: 2px solid #4af; background: #004466; color: white; }
    </style>
</head>
<body>

    <h1 style="font-weight: 300; margin-bottom: 20px;">Netolink <span style="color:#4af; font-weight:800;">AI Lab</span></h1>

    <div class="container">
        <div id="board"></div>

        <div class="sidebar">
            <div class="controls">
                <button id="btnWhite" class="active-side" onclick="setPlayerSide('w')">Play White</button>
                <button id="btnBlack" onclick="setPlayerSide('b')">Play Black</button>
            </div>

            <div class="engine-card">
                <div style="display:flex; justify-content: space-between; align-items:center;">
                    <small style="color: #666;">EVALUATION</small>
                    <div id="status" style="font-size: 0.75em; color: #4af;">Ready</div>
                </div>
                <div id="score" class="score">0.00</div>
            </div>

            <div class="history-title">Move History (PGN)</div>
            <div id="history" class="history-box"></div>

            <div class="controls">
                <button class="btn-alt" onclick="resetGame()">New Game</button>
                <button class="btn-alt" onclick="undoMove()">Undo</button>
            </div>
        </div>
    </div>

    <script>
        let game = new Chess();
        const stockfish = new Worker('stockfish.js');
        let selectedSq = null;
        let playerSide = 'w'; 

        const pieceMap = {'p':'♟','r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','P':'♙','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔'};

        function drawBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            const position = game.board();

            // אם השחקן שחור, אנחנו הופכים את הלוח ויזואלית
            const rows = playerSide === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];
            const cols = playerSide === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];

            rows.forEach(r => {
                cols.forEach(c => {
                    const sq = document.createElement('div');
                    const pos = String.fromCharCode(97 + c) + (8 - r);
                    sq.className = `sq ${(r + c) % 2 === 0 ? 'w-sq' : 'b-sq'}`;
                    if (selectedSq === pos) sq.classList.add('selected');
                    
                    const piece = position[r][c];
                    if (piece) {
                        sq.textContent = pieceMap[piece.color === 'w' ? piece.type.toUpperCase() : piece.type];
                        sq.className += piece.color === 'w' ? ' white-piece' : ' black-piece';
                    }

                    sq.onclick = () => handleMove(pos);
                    boardEl.appendChild(sq);
                });
            });
            updateHistory();
        }

        function handleMove(pos) {
            if (game.turn() !== playerSide || game.game_over()) return;

            if (selectedSq === pos) {
                selectedSq = null;
            } else if (selectedSq) {
                const move = game.move({ from: selectedSq, to: pos, promotion: 'q' });
                selectedSq = null;
                if (move) {
                    drawBoard();
                    askEngine();
                }
            } else {
                const p = game.get(pos);
                if (p && p.color === playerSide) selectedSq = pos;
            }
            drawBoard();
        }

        function askEngine() {
            document.getElementById('status').textContent = 'Thinking...';
            stockfish.postMessage(`position fen ${game.fen()}`);
            stockfish.postMessage('go depth 12');
            
            stockfish.onmessage = (e) => {
                const msg = e.data;
                if (msg.includes('score cp')) {
                    const s = (msg.split('score cp ')[1].split(' ')[0] / 100).toFixed(2);
                    // הופכים את הציון אם אנחנו שחור כדי שישקף יתרון לנו
                    document.getElementById('score').textContent = playerSide === 'w' ? s : (s * -1).toFixed(2);
                }
                if (msg.includes('bestmove')) {
                    const m = msg.split('bestmove ')[1].split(' ')[0];
                    if (m && m !== '(none)' && game.turn() !== playerSide) {
                        game.move({ from: m.substring(0,2), to: m.substring(2,4), promotion: 'q' });
                        drawBoard();
                        document.getElementById('status').textContent = 'Your Turn';
                    }
                }
            };
        }

        function updateHistory() {
            document.getElementById('history').textContent = game.pgn();
        }

        function setPlayerSide(side) {
            playerSide = side;
            document.getElementById('btnWhite').className = side === 'w' ? 'active-side' : 'btn-alt';
            document.getElementById('btnBlack').className = side === 'b' ? 'active-side' : 'btn-alt';
            resetGame();
        }

        function resetGame() {
            game = new Chess();
            selectedSq = null;
            drawBoard();
            document.getElementById('score').textContent = '0.00';
            document.getElementById('status').textContent = 'Ready';
            if (playerSide === 'b') askEngine(); // אם השחקן שחור, המנוע מתחיל
        }

        function undoMove() {
            game.undo(); game.undo();
            drawBoard();
        }

        drawBoard();
    </script>
</body>
</html>
