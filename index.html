<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netolink AI Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        .container { display: flex; gap: 30px; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 10px 50px rgba(0,0,0,0.7); }
        
        /* הלוח נבנה ב-CSS טהור */
        #board { display: grid; grid-template-columns: repeat(8, 55px); grid-template-rows: repeat(8, 55px); border: 4px solid #333; }
        .sq { width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 42px; cursor: pointer; transition: 0.1s; }
        .w-sq { background: #eeeed2; }
        .b-sq { background: #769656; }
        .selected { background: #f6f669 !important; }
        .sq:hover { filter: brightness(1.1); }

        .sidebar { width: 280px; display: flex; flex-direction: column; }
        .engine-card { background: #000; padding: 20px; border-radius: 8px; border-left: 4px solid #4af; margin: 20px 0; }
        .score { font-size: 2.2em; color: #4af; font-family: monospace; font-weight: bold; }
        button { cursor: pointer; padding: 12px; background: #4af; color: #000; border: none; border-radius: 6px; font-weight: bold; margin-bottom: 10px; }
        .best-line { color: #888; font-family: monospace; font-size: 0.85em; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

    <h1 style="font-weight: 300;">Netolink <span style="color:#4af; font-weight:800;">AI Lab</span></h1>

    <div class="container">
        <div id="board"></div>

        <div class="sidebar">
            <div id="status" style="font-weight: 600; font-size: 1.2em;">Ready to Play</div>
            
            <div class="engine-card">
                <small style="color: #666; letter-spacing: 1px;">EVALUATION</small>
                <div id="score" class="score">0.00</div>
                <div id="bestLine" class="best-line">Waiting for move...</div>
            </div>

            <button onclick="resetGame()">New Game</button>
            <button style="background:#333; color:#ccc;" onclick="undoMove()">Undo</button>
        </div>
    </div>

    <script>
        const game = new Chess();
        const stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
        let selectedSq = null;

        // הכלים הם תווים גרפיים - לא תמונות
        const pieceMap = {
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚',
            'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔'
        };

        function drawBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            const position = game.board();

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    const pos = String.fromCharCode(97 + c) + (8 - r);
                    sq.className = `sq ${(r + c) % 2 === 0 ? 'w-sq' : 'b-sq'}`;
                    if (selectedSq === pos) sq.classList.add('selected');
                    
                    const piece = position[r][c];
                    if (piece) {
                        sq.textContent = pieceMap[piece.color === 'w' ? piece.type.toUpperCase() : piece.type];
                        sq.style.color = piece.color === 'w' ? '#fff' : '#000';
                    }

                    sq.onclick = () => {
                        if (game.turn() === 'b') return;
                        if (selectedSq === pos) {
                            selectedSq = null;
                        } else if (selectedSq) {
                            const move = game.move({ from: selectedSq, to: pos, promotion: 'q' });
                            selectedSq = null;
                            if (move) {
                                drawBoard();
                                document.getElementById('status').textContent = 'Engine Thinking...';
                                askEngine();
                            }
                        } else {
                            const p = game.get(pos);
                            if (p && p.color === 'w') selectedSq = pos;
                        }
                        drawBoard();
                    };
                    boardEl.appendChild(sq);
                }
            }
        }

        function askEngine() {
            stockfish.postMessage(`position fen ${game.fen()}`);
            stockfish.postMessage('go depth 12');
            stockfish.onmessage = (e) => {
                const msg = e.data;
                if (msg.includes('score cp')) {
                    const s = msg.split('score cp ')[1].split(' ')[0];
                    document.getElementById('score').textContent = (s/100).toFixed(2);
                }
                if (msg.includes('pv ')) {
                    document.getElementById('bestLine').textContent = msg.split('pv ')[1].split(' ').slice(0, 5).join(' → ');
                }
                if (msg.includes('bestmove')) {
                    const m = msg.split('bestmove ')[1].split(' ')[0];
                    if (m && m !== '(none)') {
                        game.move({ from: m.substring(0,2), to: m.substring(2,4), promotion: 'q' });
                        drawBoard();
                        document.getElementById('status').textContent = 'Your Turn';
                    }
                }
            };
        }

        function resetGame() { game.reset(); drawBoard(); document.getElementById('status').textContent = 'Ready'; }
        function undoMove() { game.undo(); game.undo(); drawBoard(); }

        drawBoard();
    </script>
</body>
</html>
