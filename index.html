<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stockfish AI Lab - Netolink</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #board { width: 400px; margin: 20px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .controls { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 400px; }
        .status { margin-bottom: 10px; font-weight: bold; color: #333; }
        .engine-log { font-family: monospace; font-size: 0.85em; background: #222; color: #4af; padding: 10px; border-radius: 5px; height: 100px; overflow-y: auto; direction: ltr; }
        button { cursor: pointer; padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <h2>מעבדת שחמט Stockfish</h2>
    
    <div id="board"></div>

    <div class="controls">
        <div class="status" id="status">הסטטוס יופיע כאן...</div>
        <div style="margin-bottom: 10px;">
            <button onclick="newGame()">משחק חדש</button>
            <button id="hintBtn" onclick="askEngine()">קבל עצה (Hint)</button>
        </div>
        <div class="status">מחשבות המנוע:</div>
        <div class="engine-log" id="engineLog">מחכה למהלך...</div>
    </div>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var $engineLog = $('#engineLog');
        
        // חיבור ל-Stockfish דרך CDN (גרסת Web Worker)
        var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            // מותר להזיז רק את הכלים של הצד שתורו (במקרה זה המשתמש משחק לבן)
            if (piece.search(/^b/) !== -1) return false;
        }

        function makeEngineMove() {
            var fen = game.fen();
            stockfish.postMessage('position fen ' + fen);
            stockfish.postMessage('go depth 12'); // עומק החשיבה
            
            stockfish.onmessage = function(event) {
                var line = event.data;
                if (line.includes('bestmove')) {
                    var bestMove = line.split(' ')[1];
                    game.move({
                        from: bestMove.substring(0, 2),
                        to: bestMove.substring(2, 4),
                        promotion: 'q'
                    });
                    board.position(game.fen());
                    updateStatus();
                } else if (line.includes('score cp')) {
                    // הצגת הערכת המצב
                    var score = line.split('score cp ')[1].split(' ')[0];
                    $engineLog.text("Evaluation: " + (score / 100).toFixed(2));
                }
            };
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' 
            });

            if (move === null) return 'snapback';

            updateStatus();
            // אחרי מהלך השחקן, המתן חצי שנייה והפעל את Stockfish
            window.setTimeout(makeEngineMove, 500);
        }

        function updateStatus () {
            var status = '';
            var moveColor = (game.turn() === 'b') ? 'שחור' : 'לבן';

            if (game.in_checkmate()) {
                status = 'המשחק נגמר, ' + moveColor + ' בקיפוד (מט).';
            } else if (game.in_draw()) {
                status = 'המשחק נגמר, תיקו.';
            } else {
                status = 'תור: ' + moveColor;
                if (game.in_check()) status += ' (שח!)';
            }

            $status.html(status);
        }

        function newGame() {
            game.reset();
            board.start();
            $engineLog.text("מחכה למהלך...");
            updateStatus();
        }

        function askEngine() {
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 15');
            $engineLog.text("Stockfish חושב על הצעה...");
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            pieceTheme: 'https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('board', config);
        updateStatus();

    </script>
</body>
</html>
