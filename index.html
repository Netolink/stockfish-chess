<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netolink AI Lab</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            margin: 0; 
            min-height: 100vh;
        }
        .container { 
            display: flex; 
            gap: 40px; 
            max-width: 1100px; 
            width: 100%; 
            justify-content: center; 
            flex-wrap: wrap; 
            margin-top: 30px; 
        }
        #board { 
            width: 450px; 
            max-width: 95vw; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            border-radius: 4px;
            overflow: hidden;
        }
        .sidebar { 
            flex: 1; 
            min-width: 340px; 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 16px; 
            border: 1px solid #333; 
        }
        .engine-info { 
            background: #0a0a0a; 
            padding: 20px; 
            border-radius: 12px; 
            border-left: 4px solid #4af; 
            margin: 20px 0; 
        }
        .score { 
            font-size: 2.2em; 
            font-weight: 700; 
            color: #4af; 
            font-family: 'Consolas', monospace; 
        }
        .best-line { 
            font-family: 'Courier New', monospace; 
            color: #888; 
            direction: ltr; 
            text-align: left; 
            margin-top: 12px; 
            background: #161616; 
            padding: 12px; 
            border-radius: 6px;
            min-height: 20px;
        }
        .controls { display: flex; gap: 12px; margin-top: 20px; }
        button { 
            flex: 1; cursor: pointer; padding: 14px; 
            background: #4af; color: #000; border: none; 
            border-radius: 8px; font-weight: 700; font-size: 15px; 
            transition: all 0.2s; 
        }
        button:hover { background: #6bc4ff; }
        button#undoBtn { background: #333; color: #ccc; }
        .label { color: #666; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        h1 { margin: 0; font-weight: 300; font-size: 2.5em; }
        h1 span { font-weight: 800; color: #4af; }
    </style>
</head>
<body>

    <h1>Netolink <span>AI Lab</span></h1>

    <div class="container">
        <div id="board"></div>

        <div class="sidebar">
            <div class="label">Current Status</div>
            <div id="status" style="font-size: 1.4em; font-weight: 600; margin-bottom: 20px;">Ready to play</div>

            <div class="engine-info">
                <div class="label">Engine Evaluation</div>
                <div id="score" class="score">0.00</div>
                <div class="label" style="margin-top:20px;">Predicted Line</div>
                <div class="best-line" id="bestLine">Waiting for move...</div>
            </div>

            <div class="controls">
                <button onclick="resetGame()">New Game</button>
                <button id="undoBtn" onclick="undoMove()">Undo</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        function onDragStart (source, piece) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false;
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
            window.setTimeout(askStockfish, 250);
        }

        function askStockfish() {
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 12');
            
            stockfish.onmessage = function(event) {
                var msg = event.data;
                if (msg.includes('score cp')) {
                    var score = msg.split('score cp ')[1].split(' ')[0];
                    var eval = (score / 100).toFixed(2);
                    $('#score').text(eval > 0 ? '+' + eval : eval);
                }
                if (msg.includes(' pv ')) {
                    $('#bestLine').text(msg.split(' pv ')[1].split(' ').slice(0, 5).join(' → '));
                }
                if (msg.includes('bestmove')) {
                    var best = msg.split(' ')[1];
                    if (best !== '(none)') {
                        game.move({ from: best.substring(0, 2), to: best.substring(2, 4), promotion: 'q' });
                        board.position(game.fen());
                        updateStatus();
                    }
                }
            };
        }

        function updateStatus() {
            var status = game.turn() === 'b' ? 'Engine is thinking...' : 'Your Turn';
            if (game.in_checkmate()) status = 'Checkmate!';
            else if (game.in_draw()) status = 'Draw';
            $('#status').text(status);
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
            $('#score').text('0.00');
            $('#bestLine').text('Waiting for move...');
        }

        function undoMove() {
            game.undo(); game.undo();
            board.position(game.fen());
            updateStatus();
        }

        // The critical initialization
        $(document).ready(function() {
            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                onDragStart: onDragStart,
                onDrop: onDrop,
                // Using a more reliable piece theme source
                pieceTheme: 'https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/img/chesspieces/wikipedia/{piece}.png'
            });
            updateStatus();
        });
    </script>
</body>
</html>
