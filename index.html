<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netolink AI Lab - Pro Edition</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { display: flex; gap: 25px; background: #1e1e1e; padding: 25px; border-radius: 16px; box-shadow: 0 10px 50px rgba(0,0,0,0.7); flex-wrap: wrap; justify-content: center; }
        
        #board { width: 450px; border: 2px solid #333; border-radius: 4px; overflow: hidden; }
        
        /* Highlighting squares */
        .highlight-white { box-shadow: inset 0 0 3px 3px yellow; }
        .highlight-black { box-shadow: inset 0 0 3px 3px yellow; }

        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .engine-card { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid #4af; }
        .score { font-size: 2em; color: #4af; font-family: monospace; font-weight: bold; }
        
        .history-box { background: #111; border: 1px solid #333; height: 100px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 0.85em; border-radius: 6px; color: #aaa; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { cursor: pointer; padding: 10px; background: #4af; color: #000; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #6bc4ff; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        .btn-alt { background: #333; color: #ccc; }
        .btn-danger { background: #600; color: #fff; }
        .btn-danger:hover { background: #a00; }
        .active-side { border: 2px solid #4af; background: #004466; color: white; }
        h1 span { color: #4af; font-weight: 800; }
    </style>
</head>
<body>

    <h1 style="font-weight: 300; margin-bottom: 20px;">Netolink <span>AI Lab</span></h1>

    <div class="container">
        <div id="board"></div>

        <div class="sidebar">
            <div class="controls">
                <button id="btnWhite" class="active-side" onclick="changeSide('w')">Play White</button>
                <button id="btnBlack" onclick="changeSide('b')">Play Black</button>
            </div>

            <div class="engine-card">
                <div style="display:flex; justify-content: space-between; align-items:center;">
                    <small style="color: #666;">EVALUATION</small>
                    <div id="status" style="font-size: 0.75em; color: #4af;">Ready</div>
                </div>
                <div id="score" class="score">0.00</div>
            </div>

            <div id="history" class="history-box">Moves will appear here...</div>

            <div class="controls">
                <button class="btn-alt" onclick="confirmReset()">New Game</button>
                <button class="btn-alt" onclick="undoMove()">Undo</button>
                <button class="btn-danger" style="grid-column: span 2;" onclick="resign()">Resign</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let playerSide = 'w';
        const stockfish = new Worker('stockfish.js');

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((playerSide === 'w' && piece.search(/^b/) !== -1) ||
                (playerSide === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            removeHighlights();
            highlightMove(source, target);
            updateUI();
            window.setTimeout(askEngine, 250);
        }

        function askEngine() {
            if (game.game_over()) return;
            $('#status').text('Thinking...');
            stockfish.postMessage(`position fen ${game.fen()}`);
            stockfish.postMessage('go depth 12');
        }

        stockfish.onmessage = function(e) {
            let msg = e.data;
            if (msg.includes('score cp')) {
                let s = (msg.split('score cp ')[1].split(' ')[0] / 100).toFixed(2);
                $('#score').text(playerSide === 'w' ? s : (s * -1).toFixed(2));
            }
            if (msg.includes('bestmove')) {
                let m = msg.split('bestmove ')[1].split(' ')[0];
                if (m && m !== '(none)' && game.turn() !== playerSide) {
                    let move = game.move({ from: m.substring(0,2), to: m.substring(2,4), promotion: 'q' });
                    board.position(game.fen());
                    removeHighlights();
                    highlightMove(move.from, move.to);
                    updateUI();
                }
            }
        };

        function highlightMove(from, to) {
            $(`#board .square-${from}`).addClass('highlight-white');
            $(`#board .square-${to}`).addClass('highlight-white');
        }

        function removeHighlights() {
            $('#board .square-55d63').removeClass('highlight-white highlight-black');
            $('.sq, div[class^="square-"]').removeClass('highlight-white highlight-black'); // Global clear
            $('#board [class*="square-"]').removeClass('highlight-white');
        }

        function updateUI() {
            $('#history').text(game.pgn() || 'Moves will appear here...');
            let status = 'Your Turn';
            if (game.in_checkmate()) status = 'Checkmate!';
            else if (game.in_draw()) status = 'Draw';
            $('#status').text(status);
        }

        function confirmReset() {
            if (game.history().length > 0 && !game.game_over()) {
                if (!confirm("Game in progress. Start a new game anyway?")) return;
            }
            resetGame();
        }

        function resetGame() {
            game.reset();
            board.orientation(playerSide === 'w' ? 'white' : 'black');
            board.position('start');
            removeHighlights();
            updateUI();
            $('#score').text('0.00');
            if (playerSide === 'b') askEngine();
        }

        function changeSide(side) {
            if (side === playerSide) return;
            if (game.history().length > 0 && !game.game_over()) {
                if (!confirm("Game in progress. Changing sides will restart the game. Proceed?")) return;
            }
            playerSide = side;
            $('#btnWhite').toggleClass('active-side', side === 'w').toggleClass('btn-alt', side !== 'w');
            $('#btnBlack').toggleClass('active-side', side === 'b').toggleClass('btn-alt', side !== 'b');
            resetGame();
        }

        function resign() {
            if (confirm("Are you sure you want to resign?")) {
                $('#status').text('You resigned.');
                game.load('8/8/8/8/8/8/8/8 w - - 0 1'); // Simple way to 'stop' the game logic
            }
        }

        function undoMove() {
            game.undo(); game.undo();
            board.position(game.fen());
            removeHighlights();
            updateUI();
        }

        $(document).ready(function() {
            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                onDragStart: onDragStart,
                onDrop: onDrop,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            updateUI();
        });
    </script>
</body>
</html>
