<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Netolink AI Labs - Stockfish Chess</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            display: flex;
            gap: 25px;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.7);
            flex-wrap: wrap;
            justify-content: center;
        }

        #board-wrapper {
            position: relative;
        }

        #board {
            width: 450px;
            border: 2px solid #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .highlight-selected {
            background-color: rgba(255, 255, 0, 0.4) !important;
        }

        .highlight-last-move {
            box-shadow: inset 0 0 4px 4px rgba(0, 255, 255, 0.5);
        }

        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .engine-card {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #4af;
        }

        .score {
            font-size: 2em;
            color: #4af;
            font-family: monospace;
            font-weight: bold;
        }

        .history-box {
            background: #111;
            border: 1px solid #333;
            height: 120px;
            overflow-y: auto;
            padding: 10px;
            font-family: monospace;
            font-size: 0.85em;
            border-radius: 6px;
            color: #aaa;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            cursor: pointer;
            padding: 10px;
            background: #4af;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #6bc4ff;
        }

        .btn-alt {
            background: #333;
            color: #ccc;
        }

        .btn-danger {
            background: #600;
            color: #fff;
        }

        .active-side {
            border: 2px solid #4af;
            background: #004466;
            color: white;
        }

        .captured-pieces {
            display: flex;
            align-items: center;
            gap: 2px;
            min-height: 25px;
            margin-top: 5px;
            padding: 5px;
            background: #252525;
            /* רקע בהיר יותר מהשחור של הממשק */
            border-radius: 4px;
        }

        .advantage-tag {
            font-size: 12px;
            font-weight: bold;
            color: #888;
            margin-left: 8px;
        }

        .advantage-score {
            font-weight: bold;
            color: #4af;
            margin-left: 5px;
        }

        /* הוסף את זה ב-CSS */
        .square-55d63 {
            cursor: pointer;
        }

        /* סימון מהלכים חוקיים (נקודה שקופה במרכז המשבצת) */
        .highlight-hint {
            background: radial-gradient(rgba(0, 0, 0, 0.2) 25%, transparent 25%) !important;
        }

        /* סימון שח למלך (הילה אדומה מסביב למשבצת) */
        .highlight-check {
            box-shadow: inset 0 0 4px 4px rgba(255, 0, 0, 0.7) !important;
        }

        /* הודעת מט וכפתור Rematch */
        #game-over-overlay {
            margin-top: 15px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
            text-align: center;
            display: none;
            /* יופיע רק בסיום המשחק */
            border: 1px solid #444;
        }

        .rematch-btn {
            margin-top: 10px;
            background: #28a745 !important;
            /* ירוק מקצועי */
            color: white !important;
            width: 100%;
        }
    </style>
</head>

<body>

    <h1 style="font-weight: 300; margin-bottom: 20px;">Netolink AI Labs - Stockfish Chess</h1>

    <div class="container">
        <div id="board-wrapper">
            <div id="board"></div>
        </div>

        <div class="sidebar">
            <div class="controls">
                <button id="btnWhite" class="active-side" onclick="changeSide('w')">White</button>
                <button id="btnBlack" onclick="changeSide('b')">Black</button>
            </div>
            <div class="engine-card">
                <div style="display:flex; justify-content: space-between; align-items:center;">
                    <small style="color: #666;">EVALUATION</small>
                    <div id="status" style="font-size: 0.75em; color: #4af;">Ready</div>
                </div>
                <div id="score" class="score">0.00</div>
            </div>
            <div id="history" class="history-box">No moves yet...</div>
            <div id="game-over-overlay">
                <div id="game-over-msg" style="font-weight: bold; font-size: 1.2em; color: #ff4444;">CHECKMATE</div>
                <button class="rematch-btn" onclick="rematch()">Rematch</button>
            </div>
            <div class="controls">
                <button class="btn-alt" onclick="confirmReset()">New Game</button>
                <button class="btn-alt" onclick="undoMove()">Undo</button>
                <button class="btn-danger" style="grid-column: span 2;" onclick="resign()">Resign</button>
            </div>
            <div class="controls">
                <button class="btn-alt" style="grid-column: span 2;" onclick="flipBoard()">Flip Board 🔄</button>
            </div>

            <div class="engine-card">
                <div id="white-captured" class="captured-pieces"></div>
                <div id="black-captured" class="captured-pieces"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let playerSide = 'w';
        let sourceSquare = null;


        // הפונקציה המאוחדת שמטפלת בלחיצות ישירות על הלוח
        function onSquareClick(square) {
            if (game.turn() !== playerSide || game.game_over()) return;

            // ביטול בחירה בלחיצה שנייה (Deselect)
            if (sourceSquare === square) {
                sourceSquare = null;
                removeHighlights();
                return;
            }

            if (sourceSquare) {
                const piece = game.get(sourceSquare);
                let moveOptions = { from: sourceSquare, to: square, promotion: 'q' };

                // בדיקת הכתרה (Promotion)
                if (piece && piece.type === 'p' && (square[1] === '8' || square[1] === '1')) {
                    const promo = prompt("Promote to: (q)ueen, (r)ook, (b)ishop, or (k)night?", "q");
                    moveOptions.promotion = ['q', 'r', 'b', 'n'].includes(promo?.toLowerCase()) ? promo.toLowerCase() : 'q';
                }

                let move = game.move(moveOptions);

                if (move === null) {
                    // אם המהלך לא חוקי, בדוק אם המשתמש פשוט בחר כלי אחר שלו
                    let p = game.get(square);
                    if (p && p.color === playerSide) {
                        sourceSquare = square;
                        highlight(square);
                    } else {
                        sourceSquare = null;
                        removeHighlights();
                    }
                } else {
                    // מהלך חוקי בוצע בלחיצה
                    board.position(game.fen());
                    let from = sourceSquare;
                    sourceSquare = null;
                    removeHighlights();
                    highlightLastMove(from, square);
                    updateUI();
                    setTimeout(askEngine, 250);
                }
            } else {
                // בחירת כלי ראשונית
                let p = game.get(square);
                if (p && p.color === playerSide) {
                    sourceSquare = square;
                    highlight(square);
                }
            }
        }

        // פונקציית הגרירה
        function onDrop(source, target) {
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            sourceSquare = null;
            removeHighlights();
            highlightLastMove(source, target);
            updateUI();
            setTimeout(askEngine, 250);
        }

        $(document).ready(function () {
            // 1. אתחול הלוח עם הגדרות חכמות
            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                // כשמתחילים לגרור או לוחצים לחיצה ארוכה
                onDragStart: function (source, piece, position, orientation) {
                    if (game.game_over() || piece.search(new RegExp(`^${playerSide}`)) === -1) return false;

                    // לוגיקת לחיצה: אם לחצנו על אותו כלי - בטל בחירה. אם על כלי אחר - סמן אותו.
                    if (sourceSquare === source) {
                        sourceSquare = null;
                        removeHighlights();
                    } else {
                        sourceSquare = source;
                        highlight(source);
                    }
                },
                // כשמשחררים את הכלי (גרירה או לחיצה על יעד)
                onDrop: function (source, target) {
                    // אם זה אותו ריבוע (לחיצה במקום), אל תעשה כלום, תשאיר את הסימון
                    if (source === target) return;

                    let move = game.move({ from: source, to: target, promotion: 'q' });
                    if (move === null) return 'snapback';

                    sourceSquare = null;
                    removeHighlights();
                    highlightLastMove(source, target);
                    updateUI();
                    setTimeout(askEngine, 250);
                },
                moveSpeed: 'fast',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            // 2. תמיכה בלחיצה על משבצת ריקה (כדי להשלים מהלך בלחיצה-קליק)
            $('#board').on('click', '.square-55d63', function () {
                let square = $(this).data('square');
                if (sourceSquare && sourceSquare !== square) {
                    onSquareClick(square);
                }
            });

            updateUI();
        });

        // 1. הגדרת הנתיבים מראש - זה הקסם שפותר את השגיאות ב-Console
        var Module = {
            locateFile: function (path) {
                if (path.endsWith('.wasm')) return 'sf18.wasm';
                return path;
            }
        };

        // 2. טעינת ה-Worker (בלי ה-?v= כדי לא לבלבל את המנוע הפנימי)
        const stockfish = new Worker('sf18.js');

        function askEngine() {
            if (game.game_over()) return;

            $('#status').text('Stockfish 18 (Neural) is thinking...');

            stockfish.postMessage('uci');
            stockfish.postMessage('setoption name Threads value 1');
            stockfish.postMessage('setoption name Hash value 128');

            // השארנו את זה על true כי המנוע תומך בזה פנימית, אבל ויתרנו על הפנייה לקובץ החיצוני
            stockfish.postMessage('setoption name Use NNUE value true');

            stockfish.postMessage(`position fen ${game.fen()}`);
            stockfish.postMessage('go depth 18');
        }

        stockfish.onmessage = function (event) {
            let msg = event.data;
            console.log("SF says:", msg); // חשוב מאוד לראות את התקשורת ב-Console

            // 1. עדכון מדד ההערכה (Score)
            if (msg.includes('score cp')) {
                let scoreVal = (msg.split('score cp ')[1].split(' ')[0] / 100).toFixed(2);
                // התאמת הציון לפי הצד של השחקן
                $('#score').text(playerSide === 'w' ? scoreVal : (scoreVal * -1).toFixed(2));
            }

            // 2. ביצוע המהלך הטוב ביותר של המנוע
            if (msg.includes('bestmove')) {
                let bestMove = msg.split('bestmove ')[1].split(' ')[0];

                // מוודא שהמהלך תקין ושזה לא תור השחקן
                if (bestMove && bestMove !== '(none)' && game.turn() !== playerSide) {
                    let move = game.move({
                        from: bestMove.substring(0, 2),
                        to: bestMove.substring(2, 4),
                        promotion: 'q'
                    });

                    if (move) {
                        board.position(game.fen(), true);
                        removeHighlights();
                        highlightLastMove(move.from, move.to);
                        updateUI();
                    }
                }
            }
        };

        // פונקציה להיפוך ויזואלי של הלוח
        function flipBoard() {
            const current = board.orientation();
            board.orientation(current === 'white' ? 'black' : 'white');
        }

        // פונקציה לחישוב והצגת הכלים האכולים (יתרון)
        function updateCapturedPieces() {
            const fen = game.fen();
            const pieces = {
                'p': 8, 'n': 2, 'b': 2, 'r': 2, 'q': 1,
                'P': 8, 'N': 2, 'B': 2, 'R': 2, 'Q': 1
            };

            for (let char of fen.split(' ')[0]) {
                if (pieces[char] !== undefined) pieces[char]--;
            }

            const whiteCapturedDiv = $('#white-captured').empty();
            const blackCapturedDiv = $('#black-captured').empty();

            const symbolMap = { 'p': 'p', 'n': 'n', 'b': 'b', 'r': 'r', 'q': 'q' };
            const valueMap = { 'p': 1, 'n': 3, 'b': 3, 'r': 5, 'q': 9 };

            let whiteScore = 0;
            let blackScore = 0;

            // כלים שחורים שאכל הלבן (מחושב עבור יתרון לבן)
            for (let p in symbolMap) {
                for (let i = 0; i < pieces[p]; i++) {
                    whiteCapturedDiv.append(`<img src="https://chessboardjs.com/img/chesspieces/wikipedia/b${symbolMap[p].toUpperCase()}.png">`);
                    whiteScore += valueMap[p];
                }
            }

            // כלים לבנים שאכל השחור (מחושב עבור יתרון שחור)
            for (let p in symbolMap) {
                for (let i = 0; i < pieces[p.toUpperCase()]; i++) {
                    blackCapturedDiv.append(`<img src="https://chessboardjs.com/img/chesspieces/wikipedia/w${symbolMap[p].toUpperCase()}.png">`);
                    blackScore += valueMap[p];
                }
            }

            // הצגת הפרש הנקודות
            const diff = whiteScore - blackScore;
            if (diff > 0) {
                whiteCapturedDiv.append(`<span class="advantage-tag">+${diff}</span>`);
            } else if (diff < 0) {
                blackCapturedDiv.append(`<span class="advantage-tag">+${Math.abs(diff)}</span>`);
            }
        }

        function highlight(sq) {
            removeHighlights(); $(`#board .square-${sq}`).addClass('highlight-selected');
            showHints(sq);
        }
        function showHints(sq) {
            let moves = game.moves({ square: sq, verbose: true });
            moves.forEach(m => {
                $(`#board .square-${m.to}`).addClass('highlight-hint');
            });
        }
        function highlightLastMove(f, t) { $(`#board .square-${f}, #board .square-${t}`).addClass('highlight-last-move'); }
        function removeHighlights() {
            $('#board [class*="square-"]').removeClass('highlight-selected highlight-last-move highlight-hint highlight-check');
        }

        function updateUI() {
            $('#history').text(game.pgn());
            $('#status').text(game.turn() === playerSide ? 'Your Turn' : 'Waiting...');
            updateCapturedPieces();

            // הסרת סימון שח קודם
            $('#board [class*="square-"]').removeClass('highlight-check');

            // אם יש שח, מצא את משבצת המלך וצבע אותה באדום
            if (game.in_check()) {
                const fen = game.fen().split(' ')[0];
                const king = game.turn() === 'w' ? 'K' : 'k';
                let square = findKingSquare(king);
                $(`#board .square-${square}`).addClass('highlight-check');
            }

            // טיפול במט - ללא Alert
            if (game.in_checkmate()) {
                $('#status').text('Game Over');
                $('#game-over-overlay').fadeIn();
                $('#game-over-msg').text('CHECKMATE - ' + (game.turn() === 'w' ? 'Black Wins' : 'White Wins'));
            }
        }

        // פונקציית עזר למציאת המלך על הלוח
        function findKingSquare(king) {
            const boardState = game.board();
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (boardState[r][c] && boardState[r][c].type === 'k' && (king === 'K' ? boardState[r][c].color === 'w' : boardState[r][c].color === 'b')) {
                        return String.fromCharCode(97 + c) + (8 - r);
                    }
                }
            }
        }

        function confirmReset() {
            if (game.history().length > 0 && !game.game_over()) {
                if (!confirm("Game in progress. Start new game?")) return;
            }
            resetGame();
        }

        function changeSide(side) {
            if (side === playerSide) return;
            if (game.history().length > 0 && !game.game_over()) {
                if (!confirm("Changing sides will restart the game. Proceed?")) return;
            }
            playerSide = side;
            $('#btnWhite').toggleClass('active-side', side === 'w').toggleClass('btn-alt', side !== 'w');
            $('#btnBlack').toggleClass('active-side', side === 'b').toggleClass('btn-alt', side !== 'b');
            resetGame();
        }

        function resetGame() {
            game.reset(); board.orientation(playerSide === 'w' ? 'white' : 'black');
            board.position('start'); sourceSquare = null; removeHighlights(); updateUI();
            $('#score').text('0.00');
            if (playerSide === 'b') askEngine();
        }

        function undoMove() { game.undo(); game.undo(); board.position(game.fen(), true); removeHighlights(); updateUI(); }
        function resign() { if (confirm("Resign?")) { alert("You resigned."); resetGame(); } }

        function rematch() {
            $('#game-over-overlay').hide();
            // החלפת צד: אם היית לבן תהיה שחור, וההפך
            changeSide(playerSide === 'w' ? 'b' : 'w');
        }
    </script>
</body>

</html>
