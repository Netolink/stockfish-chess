<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Netolink AI Chess Lab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        #board { width: 400px; max-width: 90vw; margin: 20px 0; }
        .container { display: flex; gap: 20px; max-width: 1000px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .sidebar { flex: 1; min-width: 300px; background: #2d2d2d; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .engine-info { background: #000; padding: 15px; border-radius: 5px; border-left: 4px solid #4af; margin: 15px 0; }
        .score { font-size: 1.5em; font-weight: bold; color: #4af; }
        .best-line { font-family: monospace; color: #aaa; direction: ltr; text-align: left; margin-top: 10px; }
        button { cursor: pointer; padding: 10px 20px; background: #4af; color: black; border: none; border-radius: 4px; font-weight: bold; margin-left: 10px; }
        .label { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Netolink <span style="color:#4af">AI Chess Lab</span></h1>

    <div class="container">
        <div id="board"></div>

        <div class="sidebar">
            <div class="label">סטטוס:</div>
            <div id="status" style="font-size: 1.2em; margin-bottom: 15px;">מתחבר למנוע...</div>

            <div class="engine-info">
                <div class="label">ניתוח Stockfish:</div>
                <div id="score" class="score">0.00</div>
                <div class="best-line" id="bestLine">מחכה למהלך...</div>
            </div>

            <button onclick="resetGame()">משחק חדש</button>
            <button onclick="undoMove()">חזור מהלך</button>
        </div>
    </div>

    <script>
        var board = null;
        var game = new Chess();
        
        // אתחול מנוע
        var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        function onDragStart (source, piece) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false;
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            
            updateStatus();
            window.setTimeout(askStockfish, 250);
        }

        function askStockfish() {
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 12');
            
            stockfish.onmessage = function(event) {
                var msg = event.data;
                
                if (msg.includes('score cp')) {
                    var score = msg.split('score cp ')[1].split(' ')[0];
                    $('#score').text((score / 100).toFixed(2));
                }
                
                if (msg.includes(' pv ')) {
                    $('#bestLine').text(msg.split(' pv ')[1].split(' ').slice(0, 5).join(' → '));
                }

                if (msg.includes('bestmove')) {
                    var best = msg.split(' ')[1];
                    game.move({ from: best.substring(0, 2), to: best.substring(2, 4), promotion: 'q' });
                    board.position(game.fen());
                    updateStatus();
                }
            };
        }

        function updateStatus() {
            var status = game.turn() === 'b' ? 'המחשב חושב...' : 'תורך';
            if (game.in_checkmate()) status = 'מט!';
            $('#status').text(status);
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        function undoMove() {
            game.undo(); game.undo();
            board.position(game.fen());
            updateStatus();
        }

        // פונקציית האתחול הקריטית
        $(document).ready(function() {
            board = Chessboard('board', {
                draggable: true,
                dropOffBoard: 'snapback',
                position: 'start',
                onDragStart: onDragStart,
                onDrop: onDrop,
                // שימוש בתמונות ממקור חיצוני אמין
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            updateStatus();
        });
    </script>
</body>
</html>
