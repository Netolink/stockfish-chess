<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netolink AI Lab - Pro Click Move</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { display: flex; gap: 25px; background: #1e1e1e; padding: 25px; border-radius: 16px; box-shadow: 0 10px 50px rgba(0,0,0,0.7); flex-wrap: wrap; justify-content: center; }
        #board { width: 450px; border: 2px solid #333; border-radius: 4px; overflow: hidden; }
        
        /* Highlighting Styles */
        .highlight-selected { background-color: rgba(255, 255, 0, 0.5) !important; }
        .highlight-last-move { box-shadow: inset 0 0 3px 3px rgba(0, 255, 255, 0.7); }

        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .engine-card { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid #4af; }
        .score { font-size: 2em; color: #4af; font-family: monospace; font-weight: bold; }
        .history-box { background: #111; border: 1px solid #333; height: 100px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 0.85em; border-radius: 6px; color: #aaa; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { cursor: pointer; padding: 10px; background: #4af; color: #000; border: none; border-radius: 6px; font-weight: bold; }
        button:hover { background: #6bc4ff; }
        .btn-alt { background: #333; color: #ccc; }
        .btn-danger { background: #600; color: #fff; }
        .active-side { border: 2px solid #4af; background: #004466; color: white; }
    </style>
</head>
<body>

    <h1 style="font-weight: 300; margin-bottom: 20px;">Netolink <span>AI Lab</span></h1>

    <div class="container">
        <div id="board"></div>
        <div class="sidebar">
            <div class="controls">
                <button id="btnWhite" class="active-side" onclick="changeSide('w')">White</button>
                <button id="btnBlack" onclick="changeSide('b')">Black</button>
            </div>
            <div class="engine-card">
                <div id="status" style="color: #4af; font-size: 0.8em;">Ready</div>
                <div id="score" class="score">0.00</div>
            </div>
            <div id="history" class="history-box">No moves yet</div>
            <div class="controls">
                <button class="btn-alt" onclick="confirmReset()">New</button>
                <button class="btn-alt" onclick="undoMove()">Undo</button>
                <button class="btn-danger" style="grid-column: span 2;" onclick="resign()">Resign</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let playerSide = 'w';
        let sourceSquare = null;
        const stockfish = new Worker('stockfish.js');

        function removeHighlights() {
            $('#board .square-55d63').removeClass('highlight-selected highlight-last-move');
        }

        function onSquareClick(square) {
            if (game.turn() !== playerSide || game.game_over()) return;

            // לחיצה שנייה - ניסיון מהלך
            if (sourceSquare) {
                let move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
                
                if (move === null) {
                    // אם לחצנו על כלי אחר שלנו - החלף בחירה
                    let piece = game.get(square);
                    if (piece && piece.color === playerSide) {
                        sourceSquare = square;
                        removeHighlights();
                        $(`#board .square-${square}`).addClass('highlight-selected');
                    } else {
                        sourceSquare = null;
                        removeHighlights();
                    }
                } else {
                    // מהלך חוקי
                    board.position(game.fen());
                    let from = sourceSquare;
                    sourceSquare = null;
                    removeHighlights();
                    $(`#board .square-${from}`).addClass('highlight-last-move');
                    $(`#board .square-${square}`).addClass('highlight-last-move');
                    updateUI();
                    setTimeout(askEngine, 250);
                }
            } else {
                // לחיצה ראשונה - בחירת כלי
                let piece = game.get(square);
                if (piece && piece.color === playerSide) {
                    sourceSquare = square;
                    removeHighlights();
                    $(`#board .square-${square}`).addClass('highlight-selected');
                }
            }
        }

        function askEngine() {
            if (game.game_over()) return;
            $('#status').text('Stockfish thinking...');
            stockfish.postMessage(`position fen ${game.fen()}`);
            stockfish.postMessage('go depth 12');
        }

        stockfish.onmessage = function(e) {
            let msg = e.data;
            if (msg.includes('score cp')) {
                let s = (msg.split('score cp ')[1].split(' ')[0] / 100).toFixed(2);
                $('#score').text(playerSide === 'w' ? s : (s * -1).toFixed(2));
            }
            if (msg.includes('bestmove')) {
                let m = msg.split('bestmove ')[1].split(' ')[0];
                if (m && m !== '(none)' && game.turn() !== playerSide) {
                    let move = game.move({ from: m.substring(0,2), to: m.substring(2,4), promotion: 'q' });
                    board.position(game.fen());
                    removeHighlights();
                    $(`#board .square-${move.from}`).addClass('highlight-last-move');
                    $(`#board .square-${move.to}`).addClass('highlight-last-move');
                    updateUI();
                }
            }
        };

        function updateUI() {
            $('#history').text(game.pgn() || 'No moves yet');
            $('#status').text(game.turn() === playerSide ? 'Your Turn' : 'Waiting...');
        }

        function confirmReset() {
            if (game.history().length > 0 && !game.game_over()) {
                if (!confirm("New game?")) return;
            }
            resetGame();
        }

        function resetGame() {
            game.reset();
            board.orientation(playerSide === 'w' ? 'white' : 'black');
            board.position('start');
            sourceSquare = null;
            removeHighlights();
            updateUI();
            $('#score').text('0.00');
            if (playerSide === 'b') askEngine();
        }

        function changeSide(side) {
            if (side === playerSide) return;
            playerSide = side;
            $('#btnWhite').toggleClass('active-side', side === 'w').toggleClass('btn-alt', side !== 'w');
            $('#btnBlack').toggleClass('active-side', side === 'b').toggleClass('btn-alt', side !== 'b');
            resetGame();
        }

        function resign() {
            if (confirm("Resign?")) {
                $('#status').text('Resigned.');
                game.load('8/8/8/8/8/8/8/8 w - - 0 1');
            }
        }

        function undoMove() {
            game.undo(); game.undo();
            board.position(game.fen());
            removeHighlights();
            updateUI();
        }

        $(document).ready(function() {
            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                onDrop: function(source, target) {
                    let move = game.move({ from: source, to: target, promotion: 'q' });
                    if (move === null) return 'snapback';
                    sourceSquare = null;
                    removeHighlights();
                    $(`#board .square-${source}`).addClass('highlight-last-move');
                    $(`#board .square-${target}`).addClass('highlight-last-move');
                    updateUI();
                    setTimeout(askEngine, 250);
                },
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            // פתרון ה"קליק": האזנה לכל משבצת בלוח
            $(document).on('click', '#board [class*="square-"]', function() {
                let square = $(this).attr('data-square');
                if (!square) {
                    // אם הספרייה לא שמה data-square, נחלץ מהקלאס
                    const match = this.className.match(/square-([a-h][1-8])/);
                    if (match) square = match[1];
                }
                if (square) onSquareClick(square);
            });

            updateUI();
        });
    </script>
</body>
</html>
